agents:
  pm:
    name: Form Surface PM
    purpose: Track stage, open risks, acceptance criteria, and the next smallest verifiable step.
    may_write_code: false
    outputs:
      - current_stage
      - done
      - next
      - blockers
      - verification_needed
  explorer:
    name: Form Surface Explorer
    purpose: Read-only inventory of forms, views, sources, roles, styles, and actions.
    may_write_code: false
    tools:
      - alterios_get_form
      - alterios_get_view
      - alterios_view_entities
      - alterios_view_fields_populated
      - alterios_analyze_form_surface
    outputs:
      - target_ids
      - cell_inventory
      - data_sources
      - role_access_keys
      - action_inventory
      - analyzer_issues
  verifier:
    name: Form Surface Verifier
    purpose: Confirm that a changed form is safe, readable, and user-visible.
    may_write_code: false
    checks:
      - pytest
      - alterios_analyze_form_surface
      - readback_diff
      - ui_or_har_evidence_for_visible_changes
    outputs:
      - passed
      - failed
      - residual_risks
      - evidence
