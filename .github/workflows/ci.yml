name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m alterios_mcp.replay_smoke --json
      - run: python -m alterios_mcp.doctor --skip-console-scripts --skip-startup-benchmark --json
      - run: python scripts/check_public_tree.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python scripts/verify_release_wheel.py dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: alterios-mcp-dist
          path: dist/*
