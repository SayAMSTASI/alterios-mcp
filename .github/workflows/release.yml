name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python scripts/check_public_tree.py
      - run: python -m build
      - run: python scripts/verify_release_wheel.py dist/*.whl
      - name: Create checksums
        run: python -c "import hashlib,pathlib; files=sorted(pathlib.Path('dist').glob('*')); pathlib.Path('dist/SHA256SUMS.txt').write_text(''.join(f'{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\n' for p in files),encoding='utf-8')"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* scripts/manage_release.ps1 --generate-notes --verify-tag
